---
- name: Install FreePBX 17 on Debian 12
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Enable SSH root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#*PermitRootLogin'
        line: 'PermitRootLogin yes'
        state: present
      notify: restart sshd

    - name: Enable serial console service
      systemd:
        name: serial-getty@ttyS0.service
        enabled: yes
        state: started

    - name: Configure GRUB serial console - CMDLINE_DEFAULT
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="console=ttyS0,115200n8 console=tty0"'
        state: present
      notify: update grub

    - name: Configure GRUB serial console - TERMINAL
      lineinfile:
        path: /etc/default/grub
        regexp: '^#*GRUB_TERMINAL='
        line: 'GRUB_TERMINAL="console serial"'
        state: present
      notify: update grub

    - name: Configure GRUB serial console - SERIAL_COMMAND
      lineinfile:
        path: /etc/default/grub
        regexp: '^#*GRUB_SERIAL_COMMAND='
        line: 'GRUB_SERIAL_COMMAND="serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1"'
        state: present
      notify: update grub

    - name: Set serial port speed
      command: stty -F /dev/ttyS0 speed 115200

    - name: Install setserial
      apt:
        name: setserial
        state: present

    - name: Set baud rate with setserial
      command: setserial /dev/ttyS0 baud_base 115200

    - name: Install dnsmasq
      apt:
        name: dnsmasq
        state: present

    - name: Download FreePBX install script
      get_url:
        url: https://github.com/FreePBX/sng_freepbx_debian_install/raw/master/sng_freepbx_debian_install.sh
        dest: /tmp/sng_freepbx_debian_install.sh
        mode: '0755'

    - name: Run FreePBX install script
      command: bash /tmp/sng_freepbx_debian_install.sh
      args:
        creates: /etc/freepbx.conf

    - name: Download and install certman module
      command: fwconsole ma downloadinstall certman --force
      ignore_errors: yes

    - name: Reload FreePBX and fix permissions
      shell: fwconsole reload && fwconsole chown
      ignore_errors: yes

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: update grub
      command: update-grub
